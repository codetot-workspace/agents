# Aider config routed through 9router
# Copy to ~/.aider.conf.yml or use: aider --config configs/9router-aider.conf.yml
# Requires: 9router running at http://localhost:20128

# 9router auto-routes through free → cheap → subscription tiers
model: openai/if/kimi-k2-thinking
openai-api-base: http://localhost:20128/v1
# Set OPENAI_API_KEY to your 9router dashboard API key

# Alternative 9router models (uncomment to switch):
# model: openai/if/qwen-code
# model: openai/if/gemini-cli
# model: openai/if/iflow-ai
